apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      initContainers:
        - name: db-migrate
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag | default .Chart.AppVersion }}"
          command: ["python", "-c", "from app.database.session import init_db; import asyncio; asyncio.run(init_db())"]
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          env:
            - name: NeuraNAC_ENV
              value: {{ .Values.global.environment }}
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
              name: http
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          env:
            - name: NeuraNAC_ENV
              value: {{ .Values.global.environment }}
            - name: NEURANAC_NODE_ID
              value: {{ .Values.global.nodeId }}
            - name: NEURANAC_SITE_TYPE
              value: {{ .Values.global.siteType }}
            - name: NEURANAC_SITE_ID
              value: {{ .Values.global.siteId | quote }}
            - name: DEPLOYMENT_MODE
              value: {{ .Values.global.deploymentMode }}
            - name: LEGACY_NAC_ENABLED
              value: {{ .Values.global.legacyNacEnabled | quote }}
            - name: NEURANAC_PEER_API_URL
              value: {{ .Values.global.peerApiUrl | quote }}
            - name: BRIDGE_CONNECTOR_URL
              value: {{ .Values.global.neuranacConnectorUrl | quote }}
            - name: BRIDGE_URL
              value: {{ .Values.global.bridgeUrl | quote }}
            - name: NEURANAC_BRIDGE_TRUST_ENFORCE
              value: {{ .Values.global.bridgeTrustEnforce | quote }}
            - name: NEURANAC_CA_KEY_PATH
              value: {{ .Values.global.caKeyPath | quote }}
            - name: NEURANAC_CA_CERT_PATH
              value: {{ .Values.global.caCertPath | quote }}
            - name: FEDERATION_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-env
                  key: FEDERATION_SHARED_SECRET
                  optional: true
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
spec:
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: api-gateway
