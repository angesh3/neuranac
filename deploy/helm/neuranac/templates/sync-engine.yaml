apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sync-engine
  labels:
    app.kubernetes.io/name: sync-engine
spec:
  replicas: {{ .Values.syncEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sync-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sync-engine
    spec:
      containers:
        - name: sync-engine
          image: "{{ .Values.syncEngine.image.repository }}:{{ .Values.syncEngine.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: {{ .Values.syncEngine.ports.grpc }}
              name: grpc
            - containerPort: {{ .Values.syncEngine.ports.health }}
              name: health
          env:
            - name: NEURANAC_NODE_ID
              value: {{ .Values.global.nodeId }}
            - name: NEURANAC_SITE_TYPE
              value: {{ .Values.global.siteType }}
            - name: NEURANAC_SITE_ID
              value: {{ .Values.global.siteId | quote }}
            - name: DEPLOYMENT_MODE
              value: {{ .Values.global.deploymentMode }}
            - name: SYNC_PEER_ADDRESS
              value: {{ .Values.syncEngine.peerAddress | quote }}
            - name: NEURANAC_PEER_API_URL
              value: {{ .Values.global.peerApiUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          resources:
            {{- toYaml .Values.syncEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sync-engine
spec:
  ports:
    - port: 9090
      targetPort: grpc
      name: grpc
    - port: 9100
      targetPort: health
      name: health
  selector:
    app.kubernetes.io/name: sync-engine
