apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-policy-engine
  labels:
    app.kubernetes.io/name: policy-engine
spec:
  replicas: {{ .Values.policyEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-engine
    spec:
      containers:
        - name: policy-engine
          image: "{{ .Values.policyEngine.image.repository }}:{{ .Values.policyEngine.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: {{ .Values.policyEngine.ports.http }}
              name: http
            - containerPort: {{ .Values.policyEngine.ports.grpc }}
              name: grpc
          env:
            - name: NeuraNAC_ENV
              value: {{ .Values.global.environment }}
            - name: NEURANAC_SITE_TYPE
              value: {{ .Values.global.siteType }}
            - name: NEURANAC_SITE_ID
              value: {{ .Values.global.siteId | quote }}
            - name: DEPLOYMENT_MODE
              value: {{ .Values.global.deploymentMode }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          resources:
            {{- toYaml .Values.policyEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-policy-engine
spec:
  ports:
    - port: 8082
      targetPort: http
      name: http
    - port: 9091
      targetPort: grpc
      name: grpc
  selector:
    app.kubernetes.io/name: policy-engine
