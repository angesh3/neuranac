apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-radius-server
  labels:
    app.kubernetes.io/name: radius-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.radiusServer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: radius-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radius-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: radius-server
          image: "{{ .Values.radiusServer.image.repository }}:{{ .Values.radiusServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.radiusServer.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.radiusServer.ports.auth }}
              protocol: UDP
              name: radius-auth
            - containerPort: {{ .Values.radiusServer.ports.acct }}
              protocol: UDP
              name: radius-acct
            - containerPort: {{ .Values.radiusServer.ports.radsec }}
              protocol: TCP
              name: radsec
            - containerPort: {{ .Values.radiusServer.ports.tacacs }}
              protocol: TCP
              name: tacacs
            - containerPort: {{ .Values.radiusServer.ports.health }}
              protocol: TCP
              name: health
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          env:
            - name: NeuraNAC_ENV
              value: {{ .Values.global.environment }}
            - name: NEURANAC_NODE_ID
              value: {{ .Values.global.nodeId }}
            - name: NEURANAC_SITE_TYPE
              value: {{ .Values.global.siteType }}
            - name: NEURANAC_SITE_ID
              value: {{ .Values.global.siteId | quote }}
            - name: DEPLOYMENT_MODE
              value: {{ .Values.global.deploymentMode }}
            - name: POLICY_ENGINE_GRPC
              value: "{{ .Release.Name }}-policy-engine:9091"
          resources:
            {{- toYaml .Values.radiusServer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-radius-server
spec:
  type: LoadBalancer
  ports:
    - port: 1812
      targetPort: radius-auth
      protocol: UDP
      name: radius-auth
    - port: 1813
      targetPort: radius-acct
      protocol: UDP
      name: radius-acct
    - port: 2083
      targetPort: radsec
      protocol: TCP
      name: radsec
    - port: 49
      targetPort: tacacs
      protocol: TCP
      name: tacacs
  selector:
    app.kubernetes.io/name: radius-server
    app.kubernetes.io/instance: {{ .Release.Name }}
