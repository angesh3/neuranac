{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-pgbouncer-config
data:
  pgbouncer.ini: |
    [databases]
    neuranac = host={{ .Release.Name }}-postgresql port=5432 dbname=neuranac

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = {{ .Values.pgbouncer.maxClientConn | default 200 }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize | default 20 }}
    min_pool_size = {{ .Values.pgbouncer.minPoolSize | default 5 }}
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_lifetime = 3600
    server_idle_timeout = 600
    server_connect_timeout = 15
    query_timeout = 30
    query_wait_timeout = 120
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    stats_period = 60
    admin_users = neuranac
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          ports:
            - containerPort: 6432
              name: pgbouncer
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-pgbouncer-config
        - name: userlist
          secret:
            secretName: {{ .Release.Name }}-pgbouncer-auth
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgbouncer
spec:
  ports:
    - port: 6432
      targetPort: pgbouncer
      name: pgbouncer
  selector:
    app.kubernetes.io/name: pgbouncer
{{- end }}
