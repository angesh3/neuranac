apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai-engine
  labels:
    app.kubernetes.io/name: ai-engine
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: "{{ .Values.aiEngine.image.repository }}:{{ .Values.aiEngine.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: {{ .Values.aiEngine.port }}
              name: http
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ai-engine
spec:
  ports:
    - port: 8081
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: ai-engine
