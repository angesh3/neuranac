# PostgreSQL Primary Server Configuration for Streaming Replication
# G28: PG streaming replication config
#
# Include this file via: -c config_file=/etc/postgresql/postgresql_primary.conf
# or mount it to /etc/postgresql/conf.d/

# --- Replication Settings (Primary) ---
wal_level = replica
max_wal_senders = 5
wal_keep_size = '1GB'
max_replication_slots = 5
hot_standby = on

# --- Synchronous Replication (optional, set to '' for async) ---
# synchronous_standby_names = 'neuranac_standby_1'
synchronous_commit = on

# --- Archive (WAL shipping for PITR) ---
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# --- Connection Settings ---
listen_addresses = '*'
max_connections = 200

# --- Performance Tuning ---
shared_buffers = '256MB'
effective_cache_size = '1GB'
work_mem = '16MB'
maintenance_work_mem = '128MB'
wal_buffers = '16MB'
checkpoint_completion_target = 0.9
