# PostgreSQL Standby Server Configuration for Streaming Replication
# G28: PG streaming replication config
#
# The standby connects to the primary and streams WAL in real-time.

# --- Replication Settings (Standby) ---
hot_standby = on
hot_standby_feedback = on
wal_receiver_status_interval = 10s
max_standby_streaming_delay = 30s
max_standby_archive_delay = 30s

# --- Primary Connection ---
# Set via recovery.conf (PG < 12) or postgresql.auto.conf (PG >= 12)
# primary_conninfo is set at pg_basebackup time or via:
#   primary_conninfo = 'host=neuranac-postgres port=5432 user=replicator password=REPL_PASSWORD application_name=neuranac_standby_1'
#   primary_slot_name = 'neuranac_standby_1'

# --- Connection Settings ---
listen_addresses = '*'
max_connections = 200

# --- Performance Tuning (match primary) ---
shared_buffers = '256MB'
effective_cache_size = '1GB'
work_mem = '16MB'
maintenance_work_mem = '128MB'
