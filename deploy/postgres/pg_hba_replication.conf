# PostgreSQL Host-Based Authentication for Streaming Replication
# G28: Production-ready PG streaming replication configuration
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Replication connections (standby servers)
host    replication     replicator      10.0.0.0/8              scram-sha-256
host    replication     replicator      172.16.0.0/12           scram-sha-256
host    replication     replicator      192.168.0.0/16          scram-sha-256

# Application connections from Docker network
host    all             neuranac             10.0.0.0/8              scram-sha-256
host    all             neuranac             172.16.0.0/12           scram-sha-256
host    all             neuranac             192.168.0.0/16          scram-sha-256
