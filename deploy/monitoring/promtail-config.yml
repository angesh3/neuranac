# Promtail configuration for NeuraNAC log collection
# Collects logs from all NeuraNAC services and ships to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    tenant_id: neuranac

scrape_configs:
  # Kubernetes pod logs (when running in K8s)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
        action: keep
        regex: neuranac
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
        target_label: component
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            caller: caller
            ts: ts
            trace_id: trace_id
      - labels:
          level:
          trace_id:
      - timestamp:
          source: ts
          format: RFC3339Nano

  # Docker Compose logs (for local development)
  - job_name: docker-compose
    static_configs:
      - targets: [localhost]
        labels:
          job: neuranac
          __path__: /var/log/neuranac/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            component: component
      - labels:
          level:
          component:

  # RADIUS server structured logs
  - job_name: radius-server
    static_configs:
      - targets: [localhost]
        labels:
          job: radius-server
          component: radius-server
          __path__: /var/log/neuranac/radius-server.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            nas_ip: nas_ip
            username: username
            eap_type: eap_type
      - labels:
          level:
          eap_type:

  # API Gateway logs
  - job_name: api-gateway
    static_configs:
      - targets: [localhost]
        labels:
          job: api-gateway
          component: api-gateway
          __path__: /var/log/neuranac/api-gateway.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            method: method
            path: path
            status: status_code
            duration: duration_ms
      - labels:
          level:
          method:
          status:
