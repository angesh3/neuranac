# Loki configuration for NeuraNAC centralized log aggregation
# Deployed alongside Prometheus and Grafana for full observability stack.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 30d
  max_query_series: 5000
  max_query_length: 720h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

storage_config:
  filesystem:
    directory: /loki/storage

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h

analytics:
  reporting_enabled: false
