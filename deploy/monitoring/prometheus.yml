global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alerting_rules.yml'

scrape_configs:
  - job_name: 'radius-server'
    static_configs:
      - targets: ['radius-server:9100']
    metrics_path: /metrics

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: /metrics

  - job_name: 'policy-engine'
    static_configs:
      - targets: ['policy-engine:8082']
    metrics_path: /metrics

  - job_name: 'ai-engine'
    static_configs:
      - targets: ['ai-engine:8081']
    metrics_path: /metrics

  - job_name: 'sync-engine'
    static_configs:
      - targets: ['sync-engine:9100']
    metrics_path: /metrics

  - job_name: 'nats-exporter'
    static_configs:
      - targets: ['nats-exporter:7777']
    metrics_path: /metrics

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics
