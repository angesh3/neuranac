# Redis Sentinel Configuration for NeuraNAC
# G29: Redis Sentinel for high availability
#
# Run with: redis-sentinel /etc/redis/sentinel.conf
# Requires at least 3 Sentinel instances for quorum.

port 26379
daemonize no

# Monitor the primary Redis instance
# sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor neuranac-redis-primary redis 6379 2

# Authentication
sentinel auth-pass neuranac-redis-primary ${REDIS_PASSWORD:-neuranac_dev_password}

# Timing configuration
sentinel down-after-milliseconds neuranac-redis-primary 5000
sentinel failover-timeout neuranac-redis-primary 60000
sentinel parallel-syncs neuranac-redis-primary 1

# Notifications (optional — integrate with monitoring)
# sentinel notification-script neuranac-redis-primary /opt/neuranac/scripts/sentinel-notify.sh

# Logging
loglevel notice
logfile ""
