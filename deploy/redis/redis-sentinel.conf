# Redis Sentinel configuration for NeuraNAC HA deployment
# Requires 3 Sentinel instances for quorum (deploy on separate nodes)

port 26379
daemonize no

# Monitor the primary Redis instance
sentinel monitor neuranac-primary redis-primary 6379 2

# Authentication
sentinel auth-pass neuranac-primary ${REDIS_PASSWORD:-neuranac_prod_password}

# Timing configuration
sentinel down-after-milliseconds neuranac-primary 5000
sentinel failover-timeout neuranac-primary 30000
sentinel parallel-syncs neuranac-primary 1

# Notification script (optional)
# sentinel notification-script neuranac-primary /opt/neuranac/scripts/sentinel-notify.sh

# Logging
logfile "/var/log/redis/sentinel.log"
loglevel notice
